<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Bot</title>
    <link rel="stylesheet" href="./static/style.css" />
</head>

<body>
    <div class="page">
        <div class="app">
            <header class="topbar">
                <div class="brand">
                    <h1>Chat Bot</h1>
                    <p>Local UI with theme toggle + saved history</p>
                </div>

                <div class="actions">
                    <a class="btn" id="loginLink" href="/login">Login</a>
                    <span class="userBadge" id="userBadge" hidden></span>
                    <button class="btn" id="logoutBtn" type="button" hidden>Logout</button>
                    <button class="btn" id="themeToggle" type="button" aria-label="Toggle theme">
                        <span id="themeIcon" aria-hidden="true">◐</span>
                        Theme
                    </button>
                    <button class="btn danger" id="clearChat" type="button" aria-label="Clear chat history">
                        Clear
                    </button>
                </div>
            </header>

            <main class="panel chatShell" aria-label="Chat">
                <section class="messages" id="messages" aria-live="polite" aria-busy="false">
                    <div class="emptyState" id="emptyState">
                        Type a message to get started. Press <span class="kbd">Enter</span> to send and
                        <span class="kbd">Shift</span> + <span class="kbd">Enter</span> for a new line.
                    </div>
                </section>

                <section class="composer" aria-label="Message composer">
                    <div class="chips" aria-label="Suggested prompts">
                        <button class="chip" type="button" data-prompt="Explain recursion like I'm 10.">Recursion</button>
                        <button class="chip" type="button" data-prompt="Write a polite email asking for an extension.">Email</button>
                        <button class="chip" type="button" data-prompt="Give me 5 healthy dinner ideas.">Dinner</button>
                        <button class="chip" type="button" data-prompt="Summarize the benefits of unit tests.">Unit tests</button>
                    </div>

                    <form class="row" id="composerForm" autocomplete="off">
                        <div class="field">
                            <div class="labelRow">
                                <span>Message</span>
                                <span><span id="charCount">0</span>/800</span>
                            </div>
                            <textarea class="input" id="messageInput" name="message" rows="1"
                                placeholder="Ask something…"></textarea>
                        </div>

                        <button class="btn primary" id="sendBtn" type="submit" disabled>
                            Send
                        </button>
                    </form>
                </section>
            </main>

            <footer class="footerNote">
                Connected: UI sends messages to <span class="kbd">POST /api/chat</span>.
            </footer>
        </div>
    </div>

    <script src="./static/firebase-config.js"></script>
    <script type="module" src="./static/index-auth.js"></script>
    <script src="./static/app.js" defer></script>
</body>

</html>

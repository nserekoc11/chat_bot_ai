<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up • Chat Bot</title>
    <link rel="stylesheet" href="./static/style.css" />
</head>

<body>
    <div class="page">
        <div class="app">
            <header class="topbar">
                <div class="brand">
                    <h1>Chat Bot</h1>
                    <p>Create an account to continue</p>
                </div>

                <div class="actions">
                    <a class="btn" href="/">Back</a>
                </div>
            </header>

            <main class="panel authCard" aria-label="Signup">
                <div class="authHeader">
                    <h2>Create account</h2>
                    <p>Use email + password, or sign up with Google.</p>
                </div>

                <div class="authBody">
                    <button class="btn googleBtn" id="googleBtn" type="button">
                        Continue with Google
                    </button>

                    <div class="divider" role="separator" aria-label="Or"><span>OR</span></div>

                    <form class="authForm" id="signupForm" autocomplete="on" novalidate>
                        <label class="field">
                            <span class="label">Name (optional)</span>
                            <input class="textInput" id="name" name="name" type="text" autocomplete="name"
                                placeholder="Your name" />
                        </label>

                        <label class="field">
                            <span class="label">Email</span>
                            <input class="textInput" id="email" name="email" type="email" inputmode="email"
                                autocomplete="email" placeholder="you@example.com" required />
                        </label>

                        <label class="field">
                            <span class="label">Password</span>
                            <input class="textInput" id="password" name="password" type="password"
                                autocomplete="new-password" placeholder="Create a password" required />
                        </label>

                        <label class="field">
                            <span class="label">Confirm password</span>
                            <input class="textInput" id="confirmPassword" name="confirmPassword" type="password"
                                autocomplete="new-password" placeholder="Re-enter password" required />
                        </label>

                        <button class="btn primary" id="signupBtn" type="submit">
                            Create account
                        </button>

                        <p class="helper">
                            Already have an account? <a href="/login">Sign in</a>
                        </p>
                    </form>

                    <div class="notice" id="notice" role="status" aria-live="polite"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="./static/firebase-config.js"></script>
    <script type="module" src="./static/signup.js"></script>
</body>

</html>
